<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>WALLS & WORDS — NYC Ephemera Archive</title>

  <!-- External CSS -->
  <link rel="stylesheet" href="css/style.css" />

  <!-- Supabase CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <!-- Image compression -->
  <script src="https://cdn.jsdelivr.net/npm/browser-image-compression@2.0.2/dist/browser-image-compression.js"></script>
</head>
<body>

  <header>
    <h1>Walls &amp; Words</h1>
    <span>NYC Ephemera Archive</span>
  </header>

  <nav id="borough-nav">
    <button class="active" data-borough="all">All</button>
    <button data-borough="Manhattan">Manhattan</button>
    <button data-borough="Brooklyn">Brooklyn</button>
    <button data-borough="Queens">Queens</button>
    <button data-borough="Bronx">Bronx</button>
    <button data-borough="Staten Island">Staten Island</button>
  </nav>

  <button id="toggle-upload">+ Submit a Find</button>

  <div id="upload-panel">
    <h2>Submit a Find</h2>

    <div id="drop-zone">
      <p>Drop image here or click to browse</p>
      <img id="preview-img" alt="preview" />
      <input type="file" id="file-input" accept="image/*" />
    </div>

    <div class="form-row">
      <select id="borough-select">
        <option value="">— Borough —</option>
        <option value="Manhattan">Manhattan</option>
        <option value="Brooklyn">Brooklyn</option>
        <option value="Queens">Queens</option>
        <option value="Bronx">Bronx</option>
        <option value="Staten Island">Staten Island</option>
      </select>
      <input type="text" id="location-input" placeholder="Street / neighborhood (optional)" />
    </div>

    <div class="form-row">
      <textarea id="caption-input" placeholder="What did you find? Add context, a story, or just a description..."></textarea>
    </div>

    <div class="submit-row">
      <button id="submit-btn" disabled>Submit</button>
      <span id="status-msg"></span>
    </div>
  </div>

  <div id="grid"></div>
  <div id="empty">No submissions yet for this borough.</div>
  <div id="loading">Loading...</div>

  <!-- Lightbox -->
  <div id="lightbox">
    <button id="lightbox-close">✕</button>
    <div id="lightbox-inner">
      <img id="lightbox-img" src="" alt="" />
      <div id="lightbox-body">
        <div id="lightbox-borough"></div>
        <div id="lightbox-caption"></div>
        <div id="lightbox-location"></div>
        <div id="lightbox-date"></div>
      </div>
    </div>
  </div>

  <!-- External JS (must be at bottom so HTML loads first) -->
  <script src="js/app.js"></script>

</body>
</html>
